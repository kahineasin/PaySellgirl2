<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>账号与密码找回通知</title>
    <style>
        /* 全局样式 - 兼容主流邮件客户端 */
        body {
            margin: 0;
            padding: 0;
            background-color: #f5f7fb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            color: #1e2a3a;
        }
        .email-container {
            max-width: 560px;
            margin: 30px auto;
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }
        /* 头部装饰 */
        .email-header {
            background: linear-gradient(135deg, #2c3e50 0%, #1e2a3a 100%);
            padding: 32px 24px;
            text-align: center;
            color: white;
        }
        .email-header h1 {
            margin: 0 0 8px 0;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        .email-header p {
            margin: 0;
            font-size: 14px;
            opacity: 0.85;
        }
        /* 内容区域 */
        .email-body {
            padding: 32px 28px;
        }
        .greeting {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 20px;
            color: #1e2a3a;
        }
        .info-box {
            background-color: #f8fafc;
            border-left: 4px solid #3498db;
            padding: 20px 24px;
            border-radius: 12px;
            margin: 24px 0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .info-item {
            display: flex;
            align-items: baseline;
            margin-bottom: 16px;
            font-size: 16px;
        }
        .info-label {
            width: 70px;
            font-weight: 600;
            color: #2c3e50;
        }
        .info-value {
            flex: 1;
            color: #1e2a3a;
            font-family: monospace;
            background: #eef2f5;
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
            word-break: break-all;
        }
        .warning-text {
            background-color: #fff8e7;
            border-left: 4px solid #f1c40f;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 14px;
            color: #7f8c8d;
            margin: 28px 0 24px 0;
        }
        .warning-text strong {
            color: #e67e22;
        }
        .footer-note {
            font-size: 13px;
            color: #7f8c8d;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
            margin-top: 28px;
            text-align: center;
        }
        .btn {
            display: inline-block;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 14px;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #2c81ba;
        }
        .email-footer {
            background-color: #f9fafc;
            padding: 20px 28px;
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
            border-top: 1px solid #eef2f5;
        }
        /* 响应式 */
        @media (max-width: 600px) {
            .email-container {
                margin: 15px;
                border-radius: 16px;
            }
            .email-body {
                padding: 24px 20px;
            }
            .info-item {
                flex-direction: column;
                margin-bottom: 18px;
            }
            .info-label {
                width: auto;
                margin-bottom: 4px;
            }
        }
    </style>
</head>
<body>
    <div class="email-container">
        <!-- 头部 -->
        <div class="email-header">
            <h1> bdhome.xyz</h1>
            <p>账号与密码找回通知</p>
        </div>

        <!-- 正文 -->
        <div class="email-body">
            <div class="greeting">您好！</div>
            <p>我们收到了您“忘记密码”的请求。您的账号信息如下：</p>

            <!-- 账号密码信息卡片 -->
            {pwd}

            <!-- 安全提示 -->
            <div class="warning-text">
                <strong>⚠️ 安全提醒</strong><br>
                若您并未申请找回密码，请忽略本邮件，并检查账户是否存在异常操作。<br>
                请勿将您的密码告知他人，谨防网络诈骗。
            </div>

            <p style="font-size: 14px; margin-bottom: 8px;">为保障邮件正常接收，建议将本邮箱地址添加至您的通讯录。</p>
            <p style="font-size: 14px;">如有疑问，请联系客服：<a href="mailto:{sysEmail}" style="color: #3498db; text-decoration: none;">{sysEmail}</a></p>
        </div>

        <!-- 底部团队信息 -->
        <div class="email-footer">
            <div>BDHOME 团队 · 用心服务</div>
            <div style="margin-top: 8px;">{now}</div>
            <div style="margin-top: 12px;">
                <span style="opacity: 0.6;">© 电子书库 · 本邮件由系统自动发送，请勿直接回复</span>
            </div>
        </div>
    </div>
</body>
</html>
