<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>邮箱验证码</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f2f5f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.5;
            color: #1e2a3a;
        }
        .email-wrapper {
            max-width: 560px;
            margin: 30px auto;
            background-color: #ffffff;
            border-radius: 28px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }
        /* 头部 */
        .email-header {
            background: linear-gradient(135deg, #2c3e50 0%, #1e2a3a 100%);
            padding: 32px 24px;
            text-align: center;
            color: white;
        }
        .email-header h1 {
            margin: 0 0 8px 0;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.2px;
        }
        .email-header p {
            margin: 0;
            font-size: 14px;
            opacity: 0.85;
        }
        /* 主体内容 */
        .email-body {
            padding: 36px 28px 28px;
        }
        .greeting {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 16px;
            color: #1e2a3a;
        }
        .message {
            margin-bottom: 28px;
            color: #2c3e50;
            font-size: 16px;
        }
        /* 验证码卡片 */
        .code-box {
            background-color: #f8fafc;
            border-radius: 20px;
            text-align: center;
            padding: 24px 20px;
            margin: 24px 0;
            border: 1px solid #eef2f5;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
        }
        .code-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #5a6e7c;
            margin-bottom: 12px;
        }
        .code-value {
            font-size: 40px;
            font-weight: 700;
            font-family: 'Courier New', 'SF Mono', monospace;
            letter-spacing: 6px;
            color: #2c3e50;
            background: #ffffff;
            display: inline-block;
            padding: 12px 24px;
            border-radius: 60px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .validity {
            font-size: 13px;
            color: #7f8c8d;
            margin-top: 14px;
        }
        /* 安全提示 */
        .warning-note {
            background-color: #fffaf0;
            border-left: 4px solid #f1c40f;
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 14px;
            color: #7f8c8d;
            margin: 28px 0 20px;
        }
        .warning-note strong {
            color: #e67e22;
        }
        .contact {
            font-size: 14px;
            margin-top: 16px;
        }
        .contact a {
            color: #3498db;
            text-decoration: none;
        }
        .email-footer {
            background-color: #f9fafc;
            padding: 20px 28px;
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
            border-top: 1px solid #eef2f5;
        }
        .email-footer p {
            margin: 4px 0;
        }
        /* 响应式 */
        @media (max-width: 600px) {
            .email-wrapper {
                margin: 15px;
                border-radius: 20px;
            }
            .email-body {
                padding: 24px 20px;
            }
            .code-value {
                font-size: 32px;
                letter-spacing: 4px;
                padding: 8px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="email-wrapper">
        <!-- 头部品牌区 -->
        <div class="email-header">
            <h1>bdhome.xyz验证中心</h1>
        </div>

        <!-- 邮件正文 -->
        <div class="email-body">
            <div class="greeting">您好！</div>
            <div class="message">
                感谢您注册 <strong>BDHOME</strong>。<br>
                请使用以下验证码完成邮箱验证：
            </div>

            <!-- 验证码核心区域 -->
            <div class="code-box">
                <div class="code-label">验证码</div>
                <div class="code-value">{validCode}</div>
                <div class="validity">⏱️ 该验证码有效期为 10 分钟，仅限本次注册使用。</div>
            </div>

            <!-- 安全提醒 -->
            <div class="warning-note">
                <strong>🔒 安全提示</strong><br>
                如果您并未进行此操作，请忽略本邮件，无需任何操作。<br>
                请勿将验证码告知他人，谨防网络诈骗。
            </div>

            <div class="contact">
                为确保您能及时收到我们的邮件，建议将本邮箱地址添加至您的联系人列表。<br>
                如有任何问题，请联系客服 <a href="mailto:{sysEmail}">{sysEmail}</a>。
            </div>
        </div>

        <!-- 底部团队信息 -->
        <div class="email-footer">
            <p>BDHOME 团队 · 用心服务</p>
            <p>{now}</p>
            <p style="margin-top: 10px; opacity:0.7;">本邮件由系统自动发送，请勿直接回复</p>
        </div>
    </div>
</body>
</html>
