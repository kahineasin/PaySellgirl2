<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作者作品 · 电子书库</title>
    <link href="assets/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/bootstrap-icons.min.css">
    <style>
        body { background: #f8f9fa; }
        .navbar { background-color: #2c3e50; }
        .book-card { transition: transform 0.2s; }
        .book-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .book-cover {
            width: 100%;
            height: 200px;
            object-fit: cover;
            aspect-ratio: 3/4;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html" id="brandLink">📚 电子书库</a>
            <div class="d-flex align-items-center gap-2">
                <div id="switchBtnContainer" style="display: none;"></div>
                <form class="d-flex" action="ebook-search.html" method="get">
                    <input class="form-control form-control-sm me-2" type="search" name="q" placeholder="搜索..." required>
                    <button class="btn btn-outline-light btn-sm" type="submit">搜索</button>
                </form>
                <div class="d-flex align-items-center gap-2" id="userInfo"></div>
            </div>
        </div>
    </nav>

    <script src="common.js"></script>
    <script src="data-books.js"></script>
    <script>
        (function() {
            const user = getCurrentUser();
            const userInfoDiv = document.getElementById('userInfo');
            const brandLink = document.getElementById('brandLink');
            if (user) {
                if (user.role === 'resource') {
                    brandLink.href = 'resource-index.html';
                    brandLink.textContent = '🎬 资源走廊';
                } else {
                    brandLink.href = 'index.html';
                    brandLink.textContent = '📚 电子书库';
                }
                userInfoDiv.innerHTML = `
                    <span class="text-light me-2">👤 ${user.username}</span>
                    <a href="vip.html" class="btn btn-sm btn-warning me-2">开通VIP</a>
                    <a href="profile.html" class="btn btn-sm btn-outline-light me-2">会员中心</a>
                    <a href="logout.html" class="btn btn-sm btn-outline-light">登出</a>
                `;
            } else {
                brandLink.href = 'index.html';
                brandLink.textContent = '📚 电子书库';
                userInfoDiv.innerHTML = `
                    <a href="login.html" class="btn btn-sm btn-outline-light me-2">登录</a>
                    <a href="register.html" class="btn btn-sm btn-outline-light">注册</a>
                `;
            }
        })();

        (function() {
            const user = getCurrentUser();
            const switchBtnContainer = document.getElementById('switchBtnContainer');
            if (user && user.role === 'resource') {
                const currentPage = window.location.pathname.split('/').pop();
                if (currentPage.startsWith('resource-')) {
                    switchBtnContainer.innerHTML = `<a href="index.html" class="btn btn-sm btn-outline-light me-2">📚 电子书库</a>`;
                } else {
                    switchBtnContainer.innerHTML = `<a href="resource-index.html" class="btn btn-sm btn-outline-light me-2">🎬 资源走廊</a>`;
                }
                switchBtnContainer.style.display = 'inline-block';
            } else {
                switchBtnContainer.style.display = 'none';
            }
        })();
    </script>

    <div class="container my-4">
        <h1 id="author-name" class="mb-4"></h1>
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4" id="book-list"></div>
        <div id="empty-msg" class="alert alert-info d-none">该作者暂无书籍</div>
        <a href="index.html" class="btn btn-outline-secondary mt-4">← 返回首页</a>
    </div>

    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const authorName = params.get('name') ? decodeURIComponent(params.get('name')) : '';
            const titleEl = document.getElementById('author-name');
            const container = document.getElementById('book-list');
            const emptyMsg = document.getElementById('empty-msg');

            if (!authorName) {
                titleEl.textContent = '未指定作者';
                return;
            }

            titleEl.textContent = `✍️ ${authorName} 的作品`;

            const authorBooks = books.filter(book => book.author === authorName);

            if (authorBooks.length === 0) {
                emptyMsg.classList.remove('d-none');
                return;
            }

            emptyMsg.classList.add('d-none');
            authorBooks.forEach(book => {
                const col = document.createElement('div');
                col.className = 'col';
                col.innerHTML = `
                    <div class="card h-100 book-card">
                        <a href="book.html?id=${book.id}" style="text-decoration: none; color: inherit;">
                            <img src="${book.cover}" class="card-img-top book-cover" alt="${book.title}" onerror="this.onerror=null; this.src='assets/images/placeholder.jpg'">
                            <div class="card-body">
                                <h5 class="card-title">${book.title}</h5>
                                <p class="card-text text-secondary">${book.author}</p>
                            </div>
                        </a>
                    </div>
                `;
                container.appendChild(col);
            });
        })();
    </script>
    <script src="assets/js/bootstrap.bundle.min.js"></script>
</body>
</html>
