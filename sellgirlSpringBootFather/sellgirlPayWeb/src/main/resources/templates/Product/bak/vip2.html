<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>开通VIP · 电子书库</title>
    <link href="assets/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/bootstrap-icons.min.css">
    <style>
        body { background: #f8f9fa; }
        .navbar { background-color: #2c3e50; }
        .card { border-radius: 1rem; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .price { font-size: 2rem; font-weight: bold; color: #e67e22; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html" id="brandLink">📚 电子书库</a>
            <div class="d-flex align-items-center gap-2">
                <div id="switchBtnContainer" style="display: none;"></div>
                <form class="d-flex" action="ebook-search.html" method="get">
                    <input class="form-control form-control-sm me-2" type="search" name="q" placeholder="搜索..." required>
                    <button class="btn btn-outline-light btn-sm" type="submit">搜索</button>
                </form>
                <div class="d-flex align-items-center gap-2" id="userInfo"></div>
            </div>
        </div>
    </nav>

    <script src="common.js"></script>
    <script>
        (function() {
            const user = getCurrentUser();
            const userInfoDiv = document.getElementById('userInfo');
            const brandLink = document.getElementById('brandLink');
            const switchBtnContainer = document.getElementById('switchBtnContainer');

            if (user) {
                if (user.role === 'resource') {
                    brandLink.href = 'resource-index.html';
                    brandLink.textContent = '🎬 资源走廊';
                } else {
                    brandLink.href = 'index.html';
                    brandLink.textContent = '📚 电子书库';
                }

                userInfoDiv.innerHTML = `
                    <span class="text-light me-2">👤 ${user.username}</span>
                    <a href="vip.html" class="btn btn-sm btn-warning me-2">开通VIP</a>
                    <a href="profile.html" class="btn btn-sm btn-outline-light me-2">会员中心</a>
                    <a href="logout.html" class="btn btn-sm btn-outline-light">登出</a>
                `;

                // 切换按钮
                if (user.role === 'resource') {
                    const currentPage = window.location.pathname.split('/').pop();
                    if (currentPage.startsWith('resource-')) {
                        switchBtnContainer.innerHTML = `<a href="index.html" class="btn btn-sm btn-outline-light me-2">📚 电子书库</a>`;
                    } else {
                        switchBtnContainer.innerHTML = `<a href="resource-index.html" class="btn btn-sm btn-outline-light me-2">🎬 资源走廊</a>`;
                    }
                    switchBtnContainer.style.display = 'inline-block';
                } else {
                    switchBtnContainer.style.display = 'none';
                }
            } else {
                brandLink.href = 'index.html';
                brandLink.textContent = '📚 电子书库';
                userInfoDiv.innerHTML = `
                    <a href="login.html" class="btn btn-sm btn-outline-light me-2">登录</a>
                    <a href="register.html" class="btn btn-sm btn-outline-light">注册</a>
                `;
                switchBtnContainer.style.display = 'none';
            }
        })();
    </script>

    <div class="container my-5">
        <h1 class="text-center mb-5" id="pageTitle">选择VIP套餐</h1>
        <div class="row g-4" id="plansContainer"></div>
        <div class="text-center mt-4">
            <a href="javascript:history.back()" class="btn btn-outline-secondary">返回</a>
        </div>
    </div>

    <script>
        (function() {
            const user = getCurrentUser();
            const role = user ? user.role : 'normal';

            const pageTitle = document.getElementById('pageTitle');
            const container = document.getElementById('plansContainer');

            let plans = [];
            if (role === 'resource') {
                pageTitle.textContent = '资源站VIP套餐';
                plans = [
                    { name: '月度会员', price: 30, unit: '月', desc: ['所有资源无限下载', '高速网盘链接', '去广告'], link: 'pay.html?plan=resource_monthly&amount=30' },
                    { name: '年度会员', price: 300, unit: '年', desc: ['月度会员全部权益', '额外赠送2个月', '专属客服'], link: 'pay.html?plan=resource_yearly&amount=300' }
                ];
            } else {
                pageTitle.textContent = '电子书库VIP套餐';
                plans = [
                    { name: '月度会员', price: 15, unit: '月', desc: ['所有电子书免费阅读', '新书抢先看', '去广告'], link: 'pay.html?plan=ebook_monthly&amount=15' },
                    { name: '年度会员', price: 150, unit: '年', desc: ['月度会员全部权益', '额外赠送3个月', '专属客服'], link: 'pay.html?plan=ebook_yearly&amount=150' }
                ];
            }

            container.innerHTML = plans.map(p => `
                <div class="col-md-6">
                    <div class="card h-100">
                        <div class="card-body text-center">
                            <h3 class="card-title">${p.name}</h3>
                            <p class="price">¥${p.price}<span style="font-size: 1rem; color: #6c757d;">/${p.unit}</span></p>
                            <ul class="list-unstyled mt-3">
                                ${p.desc.map(d => `<li>✓ ${d}</li>`).join('')}
                            </ul>
                            <a href="${p.link}" class="btn btn-warning btn-lg mt-3">立即开通</a>
                        </div>
                    </div>
                </div>
            `).join('');
        })();
    </script>
    <script src="assets/js/bootstrap.bundle.min.js"></script>
</body>
</html>
