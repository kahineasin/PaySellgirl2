<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阅读 · 电子书库</title>
    <link href="assets/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/bootstrap-icons.min.css">
    <style>
        body { background: #f8f9fa; }
        .navbar { background-color: #2c3e50; }
        .chapter-content { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); font-size: 1.1rem; line-height: 1.8; }
        .nav-links { display: flex; justify-content: space-between; margin-top: 2rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html" id="brandLink">📚 电子书库</a>
            <div class="d-flex align-items-center gap-2">
                <div id="switchBtnContainer" style="display: none;"></div>
                <form class="d-flex" action="ebook-search.html" method="get">
                    <input class="form-control form-control-sm me-2" type="search" name="q" placeholder="搜索..." required>
                    <button class="btn btn-outline-light btn-sm" type="submit">搜索</button>
                </form>
                <div class="d-flex align-items-center gap-2" id="userInfo"></div>
            </div>
        </div>
    </nav>

    <script src="common.js"></script>
    <!--<script src="data-books.js"></script>-->
    <script>
        (function() {
            const user = getCurrentUser();
            const userInfoDiv = document.getElementById('userInfo');
            const brandLink = document.getElementById('brandLink');
            if (user) {
                if (user.role === 'resource') {
                    brandLink.href = 'resource-index.html';
                    brandLink.textContent = '🎬 资源走廊';
                } else {
                    brandLink.href = 'index.html';
                    brandLink.textContent = '📚 电子书库';
                }
                userInfoDiv.innerHTML = `
                    <span class="text-light me-2">👤 ${user.username}</span>
                    <a href="vip.html" class="btn btn-sm btn-warning me-2">开通VIP</a>
                    <a href="profile.html" class="btn btn-sm btn-outline-light me-2">会员中心</a>
                    <a href="logout.html" class="btn btn-sm btn-outline-light">登出</a>
                `;
            } else {
                brandLink.href = 'index.html';
                brandLink.textContent = '📚 电子书库';
                userInfoDiv.innerHTML = `
                    <a href="login.html" class="btn btn-sm btn-outline-light me-2">登录</a>
                    <a href="register.html" class="btn btn-sm btn-outline-light">注册</a>
                `;
            }
        })();

        (function() {
            const user = getCurrentUser();
            const switchBtnContainer = document.getElementById('switchBtnContainer');
            if (user && user.role === 'resource') {
                const currentPage = window.location.pathname.split('/').pop();
                if (currentPage.startsWith('resource-')) {
                    switchBtnContainer.innerHTML = `<a href="index.html" class="btn btn-sm btn-outline-light me-2">📚 电子书库</a>`;
                } else {
                    switchBtnContainer.innerHTML = `<a href="resource-index.html" class="btn btn-sm btn-outline-light me-2">🎬 资源走廊</a>`;
                }
                switchBtnContainer.style.display = 'inline-block';
            } else {
                switchBtnContainer.style.display = 'none';
            }
        })();
    </script>

    <div class="container my-4">
        <div id="chapter-header" class="mb-3">
            <h2 id="chapter-title"></h2>
            <p id="book-ref" class="text-secondary"></p>
        </div>

        <div id="chapter-content" class="chapter-content"></div>

        <div class="nav-links">
            <a href="javascript:history.back()" class="btn btn-outline-secondary">← 返回目录</a>
            <span id="chapter-nav"></span>
        </div>
    </div>

    <script  type="text/javascript" th:inline="javascript">
        (function() {
            //const params = new URLSearchParams(window.location.search);
            //const bookId = params.get('book');
            //const chapterId = params.get('chapter');
            //
            //const book = books.find(b => b.id === bookId);
            
			const bookO = [[${Model}]];
            const chapO = [[${chap}]];
            const prevChapterO=[[${prevChapter}]];
            const nextChapterO=[[${nextChapter}]];
            const book={
                id:bookO.book_id,
                title:bookO.book_name,
                author:bookO.book_author,
                cover:bookO.cover//,
                //chapters:[]
            };
            //chapO.forEach(a=>{
            //    book.chapters.push({id:a.book_chap_id,title:a.book_chap_name});
            //});
            
            if (!book) {
                document.getElementById('chapter-title').textContent = '书籍不存在';
                return;
            }

            //const chapter = book.chapters.find(c => c.id === chapterId);
            const chapter = {id:chapO.book_chap_id,title:chapO.book_chap_name,content:chapO.content};
            
            if (!chapter) {
                document.getElementById('chapter-title').textContent = '章节不存在';
                return;
            }

            document.getElementById('chapter-title').textContent = chapter.title;
            document.getElementById('book-ref').innerHTML = `《${book.title}》 · ${book.author}`;
            document.getElementById('chapter-content').innerHTML = chapter.content || '<p>暂无正文</p>';

            //const chapterIndex = book.chapters.findIndex(c => c.id === chapterId);
            //const prevChapter = chapterIndex > 0 ? book.chapters[chapterIndex - 1] : null;
            //const nextChapter = chapterIndex < book.chapters.length - 1 ? book.chapters[chapterIndex + 1] : null;
            const prevChapter =null==prevChapterO?null: {id:prevChapterO.book_chap_id,title:prevChapterO.book_chap_name};
            const nextChapter = null==nextChapterO?null: {id:nextChapterO.book_chap_id,title:nextChapterO.book_chap_name};

            let navHtml = '';
            if (prevChapter) {
                navHtml += `<a href="chapter.html?book=${book.id}&chapter=${prevChapter.id}" class="btn btn-outline-primary">上一篇：${prevChapter.title}</a> `;
            }
            if (nextChapter) {
                navHtml += `<a href="chapter.html?book=${book.id}&chapter=${nextChapter.id}" class="btn btn-outline-primary">下一篇：${nextChapter.title}</a>`;
            }
            document.getElementById('chapter-nav').innerHTML = navHtml;
        })();
    </script>
    <script src="assets/js/bootstrap.bundle.min.js"></script>
</body>
</html>
