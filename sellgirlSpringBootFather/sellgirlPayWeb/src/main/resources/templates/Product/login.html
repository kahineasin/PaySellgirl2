<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>登录 · 电子书库</title>
    <link href="assets/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/bootstrap-icons.min.css">
</head>
<body class="bg-light">
    <div class="container" style="max-width: 400px; margin-top: 100px;">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">登录</h3>
                <form id="loginForm" action="/LoginUser" method="POST">
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <input type="text" class="form-control" id="username" required name="username" th:value="${username}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-control" id="password" required name="password">
                    </div>
                    <input type="hidden" name="return_to" th:value="${return_to}" />
                    <button type="submit" class="btn btn-primary w-100">登录</button>
                </form>
                <div class="mt-3 text-center">
                    <a href="register.html">没有账号？立即注册</a>
                </div>
                <div class="mt-2 text-center">
                    <a href="index.html">返回首页</a>
                </div>
                <div id="errorMsg" class="text-danger mt-2 text-center"></div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            //e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

			//benjamin
			return;
			
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const user = users.find(u => u.username === username && u.password === password);

            if (user) {
                localStorage.setItem('currentUser', JSON.stringify(user));
                if (user.role === 'resource') {
                    window.location.href = 'resource-index.html';
                } else {
                    window.location.href = 'index.html';
                }
            } else {
                document.getElementById('errorMsg').textContent = '用户名或密码错误';
            }
        });
    </script>
</body>
</html>
