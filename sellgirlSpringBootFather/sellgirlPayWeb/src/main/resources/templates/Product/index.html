    <style>
        body { background: #f8f9fa; }

        .letter-section { margin-bottom: 2.5rem; }
        .letter-title { font-size: 2rem; font-weight: 600; border-bottom: 3px solid #3498db; padding-bottom: 0.3rem; margin-bottom: 1.2rem; }
        .book-card { transition: transform 0.2s; }
        .book-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .book-cover {
            width: 100%;
            height: 200px;
            object-fit: cover;
            aspect-ratio: 3/4;
        }
        .announcement-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 0;
            font-size: 14px;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
            z-index: 1000;
        }
        .announcement-bar marquee { width: 100%; cursor: default; }
        
        /*小图标的样式*/
        .letter-group h2 {
            border-bottom: 2px solid #0d6efd;
            padding-bottom: 0.5rem;
            margin-top: 1.5rem;
            margin-bottom: 1.2rem;
            font-weight: 500;
        }
        .book-cover {
		    width: 100%;
		    height: auto;
		    max-height: 150px;
		    object-fit: cover;  /* 保证图片按比例填充，避免变形 */

<body>

    <script>
        // 用户信息渲染
        (function() {
            const user = getCurrentUser();
            const userInfoDiv = document.getElementById('userInfo');
            const brandLink = document.getElementById('brandLink');
            if (user) {
                if (user.role === 'resource') {
                    brandLink.href = 'resource-index.html';
                    brandLink.textContent = '🎬 资源走廊';
                } else {
                    brandLink.href = 'index.html';
                    brandLink.textContent = '📚 电子书库';
                }
                const points = getUserPoints();
                let upgradeBtn = '';
                if (user.role !== 'resource') {
                    upgradeBtn = `<button class="btn btn-sm btn-outline-warning me-2" data-bs-toggle="modal" data-bs-target="#upgradeModal">⭐ 升级资源站</button>`;
                }
                userInfoDiv.innerHTML = `
                    <span class="badge bg-info text-dark me-2">⭐ ${points} 积分</span>
                    <span class="text-light me-2">👤 ${user.username}</span>
                    ${upgradeBtn}
                    <a href="pay.html" class="btn btn-sm btn-warning me-2">积分充值</a>
                    <a href="profile.html" class="btn btn-sm btn-outline-light me-2">会员中心</a>
                    <a href="logout.html" class="btn btn-sm btn-outline-light">登出</a>
                `;
            } else {
                brandLink.href = 'index.html';
                brandLink.textContent = '📚 电子书库';
                userInfoDiv.innerHTML = `
                    <a href="login.html" class="btn btn-sm btn-outline-light me-2">登录</a>
                    <a href="register.html" class="btn btn-sm btn-outline-light">注册</a>
                `;
            }
        })();

        // 切换按钮逻辑
        (function() {
            const user = getCurrentUser();
            const switchBtnContainer = document.getElementById('switchBtnContainer');
            if (user && user.role === 'resource') {
                const currentPage = window.location.pathname.split('/').pop();
                if (currentPage.startsWith('resource-')) {
                    switchBtnContainer.innerHTML = `<a href="index.html" class="btn btn-sm btn-outline-light me-2">📚 电子书库</a>`;
                } else {
                    switchBtnContainer.innerHTML = `<a href="resource-index.html" class="btn btn-sm btn-outline-light me-2">🎬 资源走廊</a>`;
                }
                switchBtnContainer.style.display = 'inline-block';
            } else {
                switchBtnContainer.style.display = 'none';
            }
        })();
    </script>

    <script type="text/javascript" th:inline="javascript">

            const container = document.getElementById('book-list-container');
            container.innerHTML = '';
            
            
            //------------------异步方式-------------------
            
            // ---------- 配置数据 ----------
            // 字母表 A ~ Z
            const ALL_LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
            const TOTAL_LETTERS = ALL_LETTERS.length;

            // 已加载字母的数量 (索引从0开始，初始加载 A 和 B，所以 loadedCount = 2)
            let loadedCount = 0;

            const allLoadedMsg = document.getElementById('all-loaded-message');

            // ---------- 辅助函数：生成某个字母的随机书籍数据 ----------
            function generateBooksForLetter(letter) {
                // 随机 5 ~ 12 本，让每组高度自然变化，更接近真实场景
                const count = Math.floor(Math.random() * 8) + 5; // 5~12本
                const books = [];
                for (let i = 1; i <= count; i++) {
                    books.push({
                        title: `${letter} 系列 · 第 ${i} 卷`,
                        // 可以扩展封面颜色或图标，此处用统一的📘，也可以加一点变化
                        icon: '📘'
                    });
                }
                return books;
            }
            // ---------- 核心函数：创建某个字母分组的 DOM 结构 (同步构建) ----------
            function createLetterGroup(letter, books) {
                //----------------------小图标方式-----------------
                // // 外层 section，代表一个字母分类
                // const section = document.createElement('section');
                // section.className = 'letter-group mb-5';  // mb-5 增加下边距

                // // 标题行：显示字母和书籍数量
                // const header = document.createElement('h2');
                // header.textContent = `${letter}  ·  ${books.length} 本电子书`;
                // section.appendChild(header);

                // // Bootstrap 栅格行
                // const row = document.createElement('div');
                // row.className = 'row g-3';  // g-3 为列之间增加间距

                // // 遍历书籍，创建封面卡片
                // books.forEach(book => {
                //     const col = document.createElement('div');
                //     // 响应式尺寸：超小屏2列，小屏3列，中屏4列，大屏6列，超大屏可能更多，这里灵活调整
                //     col.className = 'col-6 col-sm-4 col-md-3 col-lg-2';

                //     const card = document.createElement('div');
                //     card.className = 'card h-100 border-0 book-card';

                //     const cardBody = document.createElement('div');
                //     cardBody.className = 'card-body';


                //     const iconSpan = book.icon==null||''==book.icon
                //     ?document.createElement('div')
                //     :document.createElement('img');
				// 	if(book.icon==null||''==book.icon){
	            //         //// 图标模拟封面 (可以用emoji，也可以换成bootstrap icon，但为了纯净css就不引入额外库)
	            //         //const iconSpan = document.createElement('div');
	            //         iconSpan.className = 'book-icon';
	            //         iconSpan.textContent = '📘';   // 书本emoji
                //     }else{
	            //         //// 创建卡片时
				// 		//const iconSpan = document.createElement('img');
				// 		iconSpan.src = book.icon;

				// 		iconSpan.className = 'book-cover img-fluid';

                //     const titleP = document.createElement('p');

                // });

                // section.appendChild(row);

                const section = document.createElement('div');
                section.className = 'letter-section';
                section.innerHTML = `<h2 class="letter-title">${letter}</h2>`;
                const row = document.createElement('div');
                row.className = 'row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4';
                books.forEach(book => {
                    const col = document.createElement('div');
                    col.className = 'col';
                    col.innerHTML = `
                        <div class="card h-100 book-card">
                            <a href="book.html?id=${book.id}" style="text-decoration: none; color: inherit;">
                                <img src="${book.icon}" class="card-img-top book-cover" alt="${book.title}" onerror="this.onerror=null; this.src='assets/images/placeholder.jpg'">
                                <div class="card-body">
                                    <h5 class="card-title">${book.title}</h5>
                                    <p class="card-text text-secondary">
                                        <a href="author.html?name=${encodeURIComponent(book.author)}" 
                                           onclick="event.stopPropagation();" 
                                           style="color: inherit; text-decoration: underline; text-decoration-color: #6c757d; text-underline-offset: 2px;">
                                            ${book.author}

                                    </p>
                                </div>

                        </div>
                    `;

            // ---------- 同步追加一个字母分组 (用于初始加载A和B) ----------
            function mapDomainToModel(d){
            	const books=[];
                        d.forEach(book=>{
                            books.push({
                                id:book.book_id,
                                title:book.book_name,
                                author:book.book_author,
                                //icon:book.cover==null||''==book.cover?'📘':book.cover
                                icon:book.cover
                            });
                        });
                return books;
            }
            function appendLetterSync(letter) {
                const books = generateBooksForLetter(letter);
                const group = createLetterGroup(letter, books);
                container.appendChild(group);
            }

            function appendLetterSync2(letter,books) {
                const group = createLetterGroup(letter, books);
                container.appendChild(group);
            }

            // ---------- 异步模拟“从服务器”获取并追加一个字母分组 ----------
            function fetchAndAppendLetter(letter) {
                return new Promise((resolve) => {
                    // 模拟网络延迟 500ms ~ 900ms，让加载效果可见
                    const delay = Math.random() * 400 + 500; // 500~900ms
                    setTimeout(() => {
                        const books = generateBooksForLetter(letter);
                        const group = createLetterGroup(letter, books);
                        container.appendChild(group);
                        resolve();
                    }, delay);
                });
            }

            // ---------- 加载下一个字母 (由滚动触发) ----------
            function loadNextLetter() {
                // 如果已经在加载 或 已经加载完所有字母，则直接返回
                if (isLoading) return;
                if (loadedCount >= TOTAL_LETTERS) return;

                const nextIndex = loadedCount;          // 下一个字母的索引 (0-based)
                const nextLetter = ALL_LETTERS[nextIndex];

                // 上锁，显示spinner
                isLoading = true;
                spinner.style.display = 'block';
                allLoadedMsg.style.display = 'none';    // 万一之前显示了，先隐藏

                // // 异步加载
                // fetchAndAppendLetter(nextLetter)
                //     .then(() => {
                //         // 加载完成：已加载计数+1，解锁，隐藏spinner
                //         loadedCount++;
                //         isLoading = false;
                //         spinner.style.display = 'none';

                //         // 如果已经全部加载完毕，显示一条提示
                //         if (loadedCount >= TOTAL_LETTERS) {
                //             allLoadedMsg.style.display = 'block';
                //             // 可选：移除滚动监听，不再做无用计算 (但保留也无大碍)
                //         } else {
                //             // 加载完一个字母后，立即检查一下滚动条位置，如果依然接近底部则继续加载下一个
                //             // (这样当用户一口气滚到底部时，可以连续加载多个字母，直到填满屏幕或全部加载)
                //             checkScrollAndLoad();
                //         }
                //     })
                //     .catch(err => {
                //         console.warn('加载出错, 但演示中忽略', err);
                //         // 出错时也要解锁，否则会卡死
                //         isLoading = false;
                //         spinner.style.display = 'none';
                //     });

                	$.post("/PostBook",
                    {
                        letter:nextLetter
                    },
                    function(data,status){
                        //alert("Data: " + data + "\nStatus: " + status);
                        // callback({success:data.success,message:data.msg,signDays:data.data},status);

                        //// const books = generateBooksForLetter(letter);
                        //if('X'==nextLetter){
                        //    debugger;
                        //}
                        //const books = [];
                        //data.data.forEach(book=>{
                        //    books.push({
                        //        title:book.book_name,
                        //        author:book.book_author,
                        //        icon:book.cover==null||''==book.cover?'📘':book.cover
                        //    });
                        //});
                        const books=mapDomainToModel(data.data);
                        // const group = createLetterGroup(letter, books);
                        const group = createLetterGroup(nextLetter, books);
                        container.appendChild(group);
                        
                        // 加载完成：已加载计数+1，解锁，隐藏spinner
                        loadedCount++;
                        isLoading = false;
                        spinner.style.display = 'none';

                        // 如果已经全部加载完毕，显示一条提示
                        if (loadedCount >= TOTAL_LETTERS) {
                            allLoadedMsg.style.display = 'block';
                            // 可选：移除滚动监听，不再做无用计算 (但保留也无大碍)
                        } else {
                            // 加载完一个字母后，立即检查一下滚动条位置，如果依然接近底部则继续加载下一个
                            // (这样当用户一口气滚到底部时，可以连续加载多个字母，直到填满屏幕或全部加载)
                            checkScrollAndLoad();
                        }
                    })
                    .success(function() { /*alert("second success");*/ })//grid进入
                    .error(function() {                         
                        console.warn('加载出错, 但演示中忽略', err);
                        // 出错时也要解锁，否则会卡死
                        isLoading = false;
                        spinner.style.display = 'none';
                    })//tree进入
                    .complete(function(XMLHttpRequest, textStatus){})
                    ;
            }

            // ---------- 检查滚动位置，决定是否需要加载更多 ----------
            function checkScrollAndLoad() {
                // 锁或已加载完则不再触发
                if (isLoading) return;
                if (loadedCount >= TOTAL_LETTERS) return;

                // 计算滚动相关数值
                const scrollY = window.scrollY;                      // 已滚动距离
                const windowHeight = window.innerHeight;              // 视口高度
                const docHeight = document.documentElement.scrollHeight; // 文档总高度

                // 阈值：距离底部 300px 时触发加载 (可根据感觉微调)
                const threshold = 300;

                // 判断是否接近底部
                if (windowHeight + scrollY >= docHeight - threshold) {
                    loadNextLetter();
                }
            }

            // ---------- 滚动事件节流 (使用 requestAnimationFrame) ----------
            function scrollHandler() {
                requestAnimationFrame(checkScrollAndLoad);
            }

            // ---------- 初始化页面：加载A和B，然后绑定滚动事件，并首次检查 ----------
            function init() {
                //// 同步加载前两个字母 A 和 B (索引0和1)
                //appendLetterSync('A');
                //loadedCount++;  // 现在 loadedCount = 1
                //appendLetterSync('B');
                //loadedCount++;  // loadedCount = 2
                const aBook=[[${book}]];
                appendLetterSync2('A',mapDomainToModel(aBook));
                loadedCount++;  // 现在 loadedCount = 1

                // 绑定滚动监听
                window.addEventListener('scroll', scrollHandler);

                // 首次检查滚动位置：如果页面初始内容不足一屏（可能性较小，但为了健壮性）
                // 自动触发加载C，直到撑满一屏或全部加载完。保证用户一定能看到滚动加载效果。
                checkScrollAndLoad();

                // 额外：为了防止某些浏览器在load事件之前高度计算不准确，可以再延迟检查一次
                setTimeout(checkScrollAndLoad, 200);
            }

            // 一切从入口开始
            init();

        })();
    </script>
    
    <!-- 升级模态框 -->
    <div class="modal fade" id="upgradeModal" tabindex="-1" aria-labelledby="upgradeModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="upgradeModalLabel">🔓 升级为资源用户</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>输入邀请码，即可解锁资源站访问权限，享受更多精彩内容！</p>
                    <div class="mb-3">
                        <label class="form-label">邀请码</label>
                        <input type="text" class="form-control" id="modalInviteCode" placeholder="请输入邀请码">
                    </div>
                    <div id="modalUpgradeMessage"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="modalUpgradeBtn">立即升级</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 模态框升级事件
        const modalUpgradeBtn = document.getElementById('modalUpgradeBtn');
        if (modalUpgradeBtn) {
            modalUpgradeBtn.addEventListener('click', function() {
                const inviteCode = document.getElementById('modalInviteCode').value.trim();
                upgradeToResource(inviteCode,function(result){                	
	                const msgDiv = document.getElementById('modalUpgradeMessage');
	                if (result.success) {
	                    msgDiv.innerHTML = `<div class="alert alert-success">${result.message}</div>`;
	                    setTimeout(() => {
	                        location.reload();
	                    }, 1500);
	                } else {
	                    msgDiv.innerHTML = `<div class="alert alert-danger">${result.message}</div>`;
	                }
                });
            });
        }
    </script>
