<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>修改密码 · 电子书库</title>
    <link href="assets/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/bootstrap-icons.min.css">
    <style>
        body { background: #f8f9fa; }
        .navbar { background-color: #2c3e50; }
        .card { border-radius: 1rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html" id="brandLink">📚 电子书库</a>
            <div class="d-flex align-items-center gap-2">
                <div id="switchBtnContainer" style="display: none;"></div>
                <form class="d-flex" action="ebook-search.html" method="get">
                    <input class="form-control form-control-sm me-2" type="search" name="q" placeholder="搜索..." required>
                    <button class="btn btn-outline-light btn-sm" type="submit">搜索</button>
                </form>
                <div class="d-flex align-items-center gap-2" id="userInfo"></div>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 400px; margin-top: 50px;">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">修改密码</h3>
                <form id="changePwdForm" action="/PostChangePassword" method="POST">
                    <div class="mb-3">
                        <label class="form-label">当前密码</label>
                        <input type="password" class="form-control" id="oldPassword" required name="oldPassword" th:value="${oldPassword}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">新密码</label>
                        <input type="password" class="form-control" id="newPassword" required name="newPassword" th:value="${newPassword}">
                        <div class="form-text">6-20位，至少包含一个字母和一个数字</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">确认新密码</label>
                        <input type="password" class="form-control" id="confirmPassword" required name="confirmPassword" th:value="${confirmPassword}">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">确认修改</button>
                </form>
                <div id="message" class="mt-3 text-center" th:test="${message}"></div>
                <div class="mt-3 text-center">
                    <a href="profile.html" class="text-secondary">返回会员中心</a>
                </div>
            </div>
        </div>
    </div>

    <script src="common.js"></script>
    <script  type="text/javascript" th:inline="javascript">
        function validatePassword(password) {
            if (password.length < 6 || password.length > 20) return false;
            const hasLetter = /[a-zA-Z]/.test(password);
            const hasDigit = /\d/.test(password);
            return hasLetter && hasDigit;
        }

		const success=[[${success}]];
		const hasError=[[${hasError}]];
		const message=[[${message}]];
		const msgDiv = document.getElementById('message');
		if(success){
                msgDiv.innerHTML = `<div class="alert alert-success">${message}</div>`;
                alert(message);
        		localStorage.removeItem('currentUser');
                setTimeout(() => {
                    //window.location.href = 'profile.html';
                    window.location.href = 'login.html';
                }, 1500);
		}else if(hasError){
                msgDiv.innerHTML = `<div class="alert alert-danger">${message}</div>`;
		}
        document.getElementById('changePwdForm').addEventListener('submit', function(e) {
            //e.preventDefault();
            const oldPwd = document.getElementById('oldPassword').value;
            const newPwd = document.getElementById('newPassword').value;
            const confirmPwd = document.getElementById('confirmPassword').value;
            //const msgDiv = document.getElementById('message');

            if (!validatePassword(newPwd)) {
                msgDiv.innerHTML = '<div class="alert alert-danger">新密码必须为6-20位，且包含字母和数字</div>';
                e.preventDefault();
                return;
            }
            if (newPwd !== confirmPwd) {
                msgDiv.innerHTML = '<div class="alert alert-danger">两次输入的新密码不一致</div>';
                e.preventDefault();
                return;
            }
			
			return;
            const result = changePassword(oldPwd, newPwd);
            if (result.success) {
                msgDiv.innerHTML = `<div class="alert alert-success">${result.message}</div>`;
                setTimeout(() => {
                    window.location.href = 'profile.html';
                }, 1500);
            } else {
                msgDiv.innerHTML = `<div class="alert alert-danger">${result.message}</div>`;
            }
        });
    </script>

    <script src="assets/js/bootstrap.bundle.min.js"></script>
</body>
</html>
