<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资源详情 · 资源走廊</title>
    <link href="assets/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/bootstrap-icons.min.css">
    <script src="common.js"></script>
    <script src="/sg/js/jq/jquery-2.1.4.js"></script>
    <script src="/product/common2.js"></script>
    <script src="data-resources.js"></script>
    <script> requireResourceUser(); </script>
    <style>
        body { background: #f5f7fb; }
        .navbar { background-color: #2c3e50; /*margin-bottom: 2rem;*/ }
        .detail-card { background: white; border-radius: 2rem; padding: 2rem; box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
        .carousel-item .preview-img-large {
            width: 100%;
            max-width: 400px;
            height: auto;
            max-height: 400px;
            object-fit: contain;
            border-radius: 1.5rem;
            margin: 0 auto;
        }
        .netdisk-btn { background-color: #27ae60; border: none; padding: 0.8rem 2rem; border-radius: 50px; font-weight: 500; }
        .netdisk-btn:hover { background-color: #2ecc71; }
        .back-links a { text-decoration: none; margin-right: 1.5rem; }
        .consume-btn { background-color: #ffc107; border: none; padding: 0.8rem 2rem; border-radius: 50px; font-weight: 500; }
        .consume-btn:hover { background-color: #e0a800; }
        .disabled-btn { background-color: #6c757d; border: none; cursor: not-allowed; }
        .announcement-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 0;
            font-size: 14px;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
            z-index: 1000;
        }
        .announcement-bar marquee { width: 100%; cursor: default; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="resource-index.html" id="brandLink">🎬 资源走廊</a>
            <div class="d-flex align-items-center gap-2">
                <div id="switchBtnContainer" style="display: none;"></div>
                <a href="javascript:history.back()" class="btn btn-sm btn-outline-light">← 返回</a>
                <form class="d-flex" role="search" action="resource-search.html" method="get">
                    <input class="form-control form-control-sm me-2" type="search" name="q" placeholder="搜索..." required>
                    <button class="btn btn-outline-light btn-sm" type="submit">搜索</button>
                </form>
                <div class="d-flex align-items-center gap-2" id="userInfo"></div>
            </div>
        </div>
    </nav>

    <!-- 滚动公告条幅 -->
    <div class="announcement-bar" id="announcementBar">
        <marquee behavior="scroll" direction="left" scrollamount="3"></marquee>
    </div>
    <script src="announcement.js"></script>
    <script>
        document.querySelector('#announcementBar marquee').innerHTML = ANNOUNCEMENT_TEXT;
    </script>

    <script>
        (function() {
            const user = getCurrentUser();
            const userInfoDiv = document.getElementById('userInfo');
            const brandLink = document.getElementById('brandLink');
            if (user) {
                brandLink.href = 'resource-index.html';
                brandLink.textContent = '🎬 资源走廊';
                const points = getUserPoints();
                // 资源用户无升级按钮
                userInfoDiv.innerHTML = `
                    <span class="badge bg-info text-dark me-2">⭐ ${points} 积分</span>
                    <span class="text-light me-2">👤 ${user.username}</span>
                    <a href="pay.html" class="btn btn-sm btn-warning me-2">积分充值</a>
                    <a href="profile.html" class="btn btn-sm btn-outline-light me-2">会员中心</a>
                    <a href="logout.html" class="btn btn-sm btn-outline-light">登出</a>
                `;
            } else {
                brandLink.href = 'resource-index.html';
                brandLink.textContent = '🎬 资源走廊';
                userInfoDiv.innerHTML = `
                    <a href="login.html" class="btn btn-sm btn-outline-light me-2">登录</a>
                    <a href="register.html" class="btn btn-sm btn-outline-light">注册</a>
                `;
            }
        })();

        (function() {
            const user = getCurrentUser();
            const switchBtnContainer = document.getElementById('switchBtnContainer');
            if (user && user.role === 'resource') {
                switchBtnContainer.innerHTML = `<a href="index.html" class="btn btn-sm btn-outline-light me-2">📚 电子书库</a>`;
                switchBtnContainer.style.display = 'inline-block';
            } else {
                switchBtnContainer.style.display = 'none';
            }
        })();
    </script>

    <div class="container">
        <div id="detail-container" class="detail-card">
            <div id="loading" class="text-center py-5">加载资源详情...</div>
            <div id="error-message" class="alert alert-danger d-none" role="alert"></div>
            <div id="detail-content" class="d-none">
                <div class="row align-items-center">
                    <div class="col-md-5 text-center">
                        <div id="detailCarousel" class="carousel slide" data-bs-ride="carousel">
                            <div class="carousel-indicators" id="carouselIndicators"></div>
                            <div class="carousel-inner" id="carouselInner"></div>
                            <button class="carousel-control-prev" type="button" data-bs-target="#detailCarousel" data-bs-slide="prev">
                                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                                <span class="visually-hidden">上一张</span>
                            </button>
                            <button class="carousel-control-next" type="button" data-bs-target="#detailCarousel" data-bs-slide="next">
                                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                                <span class="visually-hidden">下一张</span>
                            </button>
                        </div>
                    </div>
                    <div class="col-md-7">
                        <h2 id="detail-title" class="mb-3 fw-bold"></h2>
                        <p id="detail-description" class="text-secondary mb-4"></p>
                        
                        <!-- 上传用户 -->
                        <div class="mb-3">
                            <span class="badge bg-secondary bg-opacity-10 text-dark p-2 px-3">👤 上传用户</span>
                            <span class="ms-2" id="detail-uploader"></span>
                        </div>

                        <!-- 时长、文件大小等元信息 -->
                        <div class="mb-3">
                            <span class="badge bg-secondary bg-opacity-10 text-dark p-2 px-3">⏱️ 时长</span>
                            <span class="ms-2" id="detail-duration"></span>
                        </div>
                        <div class="mb-3">
                            <span class="badge bg-secondary bg-opacity-10 text-dark p-2 px-3">🖼️ 图片数量</span>
                            <span class="ms-2" id="detail-imageCount"></span>
                        </div>
                        <div class="mb-3">
                            <span class="badge bg-secondary bg-opacity-10 text-dark p-2 px-3">💾 文件大小</span>
                            <span class="ms-2" id="detail-size"></span>
                        </div>

                        <div class="mb-3">
                            <span class="badge bg-primary bg-opacity-10 text-dark p-2 px-3">📎 网盘地址</span>
                            <div class="mt-2">
                                <a th:href="${netdisk}" id="detail-netdisk" class="btn netdisk-btn text-white" target="_blank">🔗 立即保存 / 提取</a>
                            </div>
                        </div>
                        
                        <!-- 消耗积分查看网盘信息 -->
                        <div id="consumeArea">
                            <div id="consumeBtnDiv" class="mb-3">
                                <button id="consumeButton" class="btn consume-btn btn-lg"  data-bs-toggle="modal" data-bs-target="#upgradeModal">消耗1积分查看网盘信息</button>
                            </div>
                            <div id="resourceInfo" style="display: none;">
                                <div class="mb-3">
                                    <span class="badge bg-secondary bg-opacity-10 text-dark p-2 px-3">🔑 提取码</span>
                                    <span class="ms-2" id="extractCodeValue"></span>
                                </div>
                                <div class="mb-3">
                                    <span class="badge bg-secondary bg-opacity-10 text-dark p-2 px-3">🔐 解压密码</span>
                                    <span class="ms-2" id="unlockPasswordValue"></span>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex align-items-center gap-3 mb-3">
                            <button id="favoriteBtn" class="btn btn-outline-warning btn-sm">⭐ 收藏资源</button>
                        </div>
                        <hr>
                        <div class="back-links">
                            <a href="resource-index.html" class="text-secondary">🏠 首页</a>
                            <a href="#" id="back-to-board-link" class="text-secondary">📂 返回分区</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 升级模态框 -->
    <div class="modal fade" id="upgradeModal" tabindex="-1" aria-labelledby="upgradeModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="upgradeModalLabel">🔓 确定消耗1积分解锁</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>建议先查看网盘连接是否过期</p>
                    <!--<div class="mb-3">
                        <label class="form-label">邀请码</label>
                        <input type="text" class="form-control" id="modalInviteCode" placeholder="请输入邀请码">
                    </div>-->
                    <div id="modalUpgradeMessage"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="modalUpgradeBtn">立即升级</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/product/resource-common.js"></script>
    <script  type="text/javascript" th:inline="javascript">
        (function() {
            const uploaderNames = [
                '深海里的鱼', '云中漫步', '星空下的猫', '风一样的男子', '雨夜带刀',
                '书虫小七', '影视收藏家', '资源搬运工', '分享快乐', '逍遥客',
                '追风少年', '静听花开', '月下独酌', '雪落无声', '飞鸟与鱼',
                '青衫故人', '白衣卿相', '梦里不知身是客', '此间少年', '南风知我意',
                '北冥有鱼', '东篱把酒', '西窗烛', '南山南', '北海北',
                '江湖故人', '红尘客栈', '天涯过客', '孤舟蓑笠翁', '独钓寒江雪'
            ];

            function getFixedIndex(str) {
                let hash = 0;
                for (let i = 0; i < str.length; i++) {
                    hash = ((hash << 5) - hash) + str.charCodeAt(i);
                    hash |= 0;
                }
                return Math.abs(hash) % uploaderNames.length;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const threadId = urlParams.get('id');

            const loadingDiv = document.getElementById('loading');
            const errorDiv = document.getElementById('error-message');
            const contentDiv = document.getElementById('detail-content');
            const detailTitle = document.getElementById('detail-title');
            const detailDescription = document.getElementById('detail-description');
            const detailUploader = document.getElementById('detail-uploader');
            const detailDuration = document.getElementById('detail-duration');
            const detailImageCount = document.getElementById('detail-imageCount');
            const detailSize = document.getElementById('detail-size');
            const detailNetdisk = document.getElementById('detail-netdisk');
            const extractCodeSpan = document.getElementById('extractCodeValue');
            const unlockPasswordSpan = document.getElementById('unlockPasswordValue');
            const backToBoardLink = document.getElementById('back-to-board-link');
            const favoriteBtn = document.getElementById('favoriteBtn');
            const carouselInner = document.getElementById('carouselInner');
            const carouselIndicators = document.getElementById('carouselIndicators');
            const consumeButton = document.getElementById('consumeButton');
            const resourceInfoDiv = document.getElementById('resourceInfo');

            if (!threadId) {
                loadingDiv.classList.add('d-none');
                errorDiv.classList.remove('d-none');
                errorDiv.textContent = '缺少资源ID，无法显示';
                return;
            }

            //let foundThread = null;
            //let parentBoard = null;
            //
            //for (let board of boards) {
            //    const match = board.threads.find(t => t.id === threadId);
            //    if (match) {
            //        foundThread = match;
            //        parentBoard = board;
            //        break;
            //    }
            //}            
            
            let foundThread = [[${Model}]];
            let parentBoardId = [[${resourceType}]];
            const isResourceUnlocked=[[${isResourceUnlocked}]];
            let resourceLock=[[${resourceLock}]];
            //alert(isResourceUnlocked);
            //alert(JSON.stringify(resourceLock));

            if (!foundThread //|| !parentBoard
            ) {
                loadingDiv.classList.add('d-none');
                errorDiv.classList.remove('d-none');
                errorDiv.textContent = `没有找到ID为“${threadId}”的资源`;
                return;
            }
            //foundThread.id=foundThread.resource_id;
            //foundThread.title=foundThread.resource_name;
            //foundThread.id=foundThread.resource_id;
            foundThread=mapResourceToDto(foundThread,parentBoardId);
            let parentBoard={id:parentBoardId};

            loadingDiv.classList.add('d-none');
            contentDiv.classList.remove('d-none');

            detailTitle.textContent = foundThread.title;
            detailDescription.textContent = foundThread.description || '暂无详细介绍';
            //const index = getFixedIndex(foundThread.id);
            //detailUploader.textContent = uploaderNames[index];
            detailUploader.textContent = foundThread.resource_author;

            if (foundThread.duration) {
                detailDuration.textContent = foundThread.duration + ' 分钟';
            } else {
                detailDuration.parentElement.style.display = 'none';
            }
            if (foundThread.imageCount) {
                detailImageCount.textContent = foundThread.imageCount + ' 张';
            } else {
                detailImageCount.parentElement.style.display = 'none';
            }
            if (foundThread.size) {
                //const sizeGB = (foundThread.size / 1024).toFixed(1);
                //detailSize.textContent = sizeGB + ' GB';
                detailSize.textContent = formatMB(foundThread.size);
            } else {
                detailSize.parentElement.style.display = 'none';
            }

            backToBoardLink.href = `resource-board.html?board=${parentBoard.id}`;

            let images = foundThread.images || [foundThread.previewImg];
            carouselInner.innerHTML = '';
            carouselIndicators.innerHTML = '';

            images.forEach((imgSrc, idx) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = `carousel-item ${idx === 0 ? 'active' : ''}`;
                itemDiv.innerHTML = `
                    <img src="${imgSrc}" class="d-block preview-img-large" alt="${foundThread.title}" onerror="this.onerror=null; this.src='assets/images/placeholder.jpg'" />
                `;
                carouselInner.appendChild(itemDiv);

                const indicatorBtn = document.createElement('button');
                indicatorBtn.type = 'button';
                indicatorBtn.dataset.bsTarget = '#detailCarousel';
                indicatorBtn.dataset.bsSlideTo = idx;
                indicatorBtn.className = idx === 0 ? 'active' : '';
                indicatorBtn.setAttribute('aria-current', idx === 0 ? 'true' : 'false');
                indicatorBtn.setAttribute('aria-label', `Slide ${idx + 1}`);
                carouselIndicators.appendChild(indicatorBtn);
            });

            // 显示网盘信息
            function showResourceInfo() {
                detailNetdisk.href = resourceLock.netdisk;
                detailNetdisk.textContent = '🔗 立即保存 / 提取';
                extractCodeSpan.textContent = resourceLock.extractCode || '无';
                unlockPasswordSpan.textContent = resourceLock.unlockPassword || '无';
                resourceInfoDiv.style.display = 'block';
                consumeButton.style.display = 'none';
            }

            // 检查是否已解锁
            if (//isResourceUnlocked(threadId)
            isResourceUnlocked
            ) {
                showResourceInfo();
            } else {
                const user = getCurrentUser();
                if (!user) {
                    consumeButton.textContent = '请先登录';
                    consumeButton.disabled = true;
                } else {
                    const points = getUserPoints();
                    if (points >= 1) {
                        consumeButton.disabled = false;
                        consumeButton.textContent = '消耗1积分查看网盘信息';
                    } else {
                        consumeButton.disabled = true;
                        consumeButton.textContent = '积分不足，请先充值';
                    }
                }
                const consumeButton2 = document.getElementById('modalUpgradeBtn');
                consumeButton2//consumeButton //原本. 现加确定框   
                .addEventListener('click', function() {
                	//alert('aaaa');
                	//return;
                    consumeButton2.disabled = true;
                    const user = getCurrentUser();
                    if (!user) {
                        alert('请先登录');
                        window.location.href = 'login.html';
                        return;
                    }
                    // 调用 unlockResource 消耗积分（1分）
                    unlockResource(threadId,parentBoardId,
                    	function(result){    		          	
			                const msgDiv = document.getElementById('modalUpgradeMessage');
			                if (result.success) {
			                		
                    			resourceLock=result.resourceLock;
		                        showResourceInfo();
		                        // 更新导航栏积分显示
		                        const userInfoDiv = document.getElementById('userInfo');
		                        //const points = getUserPoints();
		                        userInfoDiv.innerHTML = userInfoDiv.innerHTML.replace(/⭐ \d+ 积分/, `⭐ ${result.point} 积分`);
		                        
			                    msgDiv.innerHTML = `<div class="alert alert-success">${result.message}</div>`;
			                    setTimeout(() => {
			                        location.reload();
			                    }, 1500);
			                } else {
			                    msgDiv.innerHTML = `<div class="alert alert-danger">${result.message}</div>`;
                    			consumeButton2.disabled = false;
			                }
			                
                    		//if(result.success){                
                    		//
                    		//	resourceLock=result.resourceLock;
		                    //    showResourceInfo();
		                    //    // 更新导航栏积分显示
		                    //    const userInfoDiv = document.getElementById('userInfo');
		                    //    //const points = getUserPoints();
		                    //    userInfoDiv.innerHTML = userInfoDiv.innerHTML.replace(/⭐ \d+ 积分/, `⭐ ${result.point} 积分`);
                    		//}else{
                        	//	alert(result.message);
                    		//	consumeButton.disabled = false;
                    		//}
                    	}
                    );
                    //if (unlockResource(threadId)) {
                    //    showResourceInfo();
                    //    // 更新导航栏积分显示
                    //    const userInfoDiv = document.getElementById('userInfo');
                    //    const points = getUserPoints();
                    //    userInfoDiv.innerHTML = userInfoDiv.innerHTML.replace(/⭐ \d+ 积分/, `⭐ ${points} 积分`);
                    //} else {
                    //    alert('积分不足，无法查看');
                    //}
                });
            }

            // 收藏按钮
            function updateFavoriteBtn() {
                if (isFavorite('resource', foundThread.id)) {
                    favoriteBtn.textContent = '★ 已收藏';
                    favoriteBtn.classList.remove('btn-outline-warning');
                    favoriteBtn.classList.add('btn-warning');
                } else {
                    favoriteBtn.textContent = '⭐ 收藏资源';
                    favoriteBtn.classList.remove('btn-warning');
                    favoriteBtn.classList.add('btn-outline-warning');
                }
            }
            updateFavoriteBtn();

            favoriteBtn.addEventListener('click', function() {
                if (!getCurrentUser()) {
                    alert('请先登录');
                    window.location.href = 'login.html';
                    return;
                }
                if (isFavorite('resource', foundThread.id)) {
                    removeFavorite('resource', foundThread.id);
                } else {
                    addFavorite({
                        type: 'resource',
                        id: foundThread.id,
                        title: foundThread.title,
                        cover: foundThread.previewImg,
                        description: foundThread.description,
                        resourceType: parentBoardId
                    });
                }
                updateFavoriteBtn();
            });
        })();
    </script>
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    
    

</body>
</html>
