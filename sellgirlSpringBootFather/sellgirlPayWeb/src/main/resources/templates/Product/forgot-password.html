<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>找回密码 · 电子书库</title>
    <link href="assets/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/bootstrap-icons.min.css">
</head>
<body class="bg-light">
    <div class="container" style="max-width: 400px; margin-top: 100px;">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">找回密码</h3>
                <form id="forgotForm">
                    <div class="mb-3">
                        <label class="form-label">邮箱</label>
                        <input type="email" class="form-control" id="email" required>
                        <div class="form-text">输入您注册时使用的邮箱</div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">发送重置链接</button>
                </form>
                <div class="mt-3 text-center">
                    <a href="login.html">返回登录</a>
                </div>
                <div id="message" class="mt-3 text-center"></div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const user = users.find(u => u.email === email);
            const messageDiv = document.getElementById('message');

            if (user) {
                // 模拟发送邮件
                messageDiv.innerHTML = '<div class="alert alert-success">重置链接已发送至您的邮箱（演示模式，请查看控制台）</div>';
                console.log(`重置密码链接（模拟）：forgot-password.html?token=reset_${user.username}_${Date.now()}`);
            } else {
                messageDiv.innerHTML = '<div class="alert alert-danger">该邮箱未注册</div>';
            }
        });
    </script>
</body>
</html>
