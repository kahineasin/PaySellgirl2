<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资源走廊 · 首页分区预览</title>
    <link href="assets/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/bootstrap-icons.min.css">
    <script src="common.js"></script>
    <script src="data-resources.js"></script>
    <script> requireResourceUser(); </script>
    <style>
        body { background: #f5f7fb; }
        .navbar { background-color: #2c3e50; /*margin-bottom: 2rem;*/ }
        .navbar-brand { color: #fff !important; font-weight: 600; }
        .card { transition: transform 0.15s ease, box-shadow 0.2s; border: none; border-radius: 1.2rem; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.02); }
        .card:hover { transform: translateY(-4px); box-shadow: 0 16px 30px rgba(0,0,0,0.08); }
        .section-title { font-size: 1.5rem; font-weight: 600; border-left: 6px solid #3498db; padding-left: 1rem; margin-bottom: 1.5rem; }
        .btn-outline-primary { border-radius: 30px; padding: 0.3rem 1.2rem; font-size: 0.9rem; }
        .latest-grid { display: flex; flex-wrap: wrap; gap: 0.75rem; margin: 1rem 0 0.5rem; }
        .latest-item {
            width: calc(50% - 0.375rem);
            display: block;
            text-decoration: none;
            color: inherit;
        }
        .latest-item img {
            width: 100%;
            height: 80px;
            object-fit: cover;
            border-radius: 0.6rem;
            background: #e9ecef;
        }
        .latest-item span { display: block; font-size: 0.8rem; font-weight: 500; margin-top: 0.2rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .card-footer-action { background: none; border-top: 1px solid rgba(0,0,0,0.05); padding: 0.75rem 1rem; }
        .footer-mock { text-align: center; padding: 2rem; color: #7f8c8d; font-size: 0.9rem; margin-top: 3rem; border-top: 1px solid #dee2e6; }
        .announcement-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 0;
            font-size: 14px;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
            z-index: 1000;
        }
        .announcement-bar marquee { width: 100%; cursor: default; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="resource-index.html" id="brandLink">🎬 资源走廊</a>
            <div class="d-flex align-items-center gap-2">
                <div id="switchBtnContainer" style="display: none;"></div>
                <form class="d-flex" role="search" action="resource-search.html" method="get">
                    <input class="form-control form-control-sm me-2" type="search" name="q" placeholder="搜索资源..." required>
                    <button class="btn btn-outline-light btn-sm" type="submit">搜索</button>
                </form>
                <div class="d-flex align-items-center gap-2" id="userInfo"></div>
            </div>
        </div>
    </nav>

    <div class="announcement-bar" id="announcementBar">
        <marquee behavior="scroll" direction="left" scrollamount="3"></marquee>
    </div>
    <script src="announcement.js"></script>
    <script>
        document.querySelector('#announcementBar marquee').innerHTML = ANNOUNCEMENT_TEXT;
    </script>

    <script>
        (function() {
            const user = getCurrentUser();
            const userInfoDiv = document.getElementById('userInfo');
            const brandLink = document.getElementById('brandLink');
            if (user) {
                brandLink.href = 'resource-index.html';
                brandLink.textContent = '🎬 资源走廊';
                const points = getUserPoints();
                userInfoDiv.innerHTML = `
                    <span class="badge bg-info text-dark me-2">⭐ ${points} 积分</span>
                    <span class="text-light me-2">👤 ${user.username}</span>
                    <a href="pay.html" class="btn btn-sm btn-warning me-2">积分充值</a>
                    <a href="profile.html" class="btn btn-sm btn-outline-light me-2">会员中心</a>
                    <a href="logout.html" class="btn btn-sm btn-outline-light">登出</a>
                `;
            } else {
                brandLink.href = 'resource-index.html';
                brandLink.textContent = '🎬 资源走廊';
                userInfoDiv.innerHTML = `
                    <a href="login.html" class="btn btn-sm btn-outline-light me-2">登录</a>
                    <a href="register.html" class="btn btn-sm btn-outline-light">注册</a>
                `;
            }
        })();

        (function() {
            const user = getCurrentUser();
            const switchBtnContainer = document.getElementById('switchBtnContainer');
            if (user && user.role === 'resource') {
                switchBtnContainer.innerHTML = `<a href="index.html" class="btn btn-sm btn-outline-light me-2">📚 电子书库</a>`;
                switchBtnContainer.style.display = 'inline-block';
            } else {
                switchBtnContainer.style.display = 'none';
            }
        })();
    </script>

    <div class="container">
        <h2 class="section-title">📌 最新资源 · 分区预览</h2>
        <div class="row g-4" id="board-cards-container"></div>
    </div>

    <div class="footer-mock">
        ⚡ 每个卡片内显示该分区最新4条资源 · 点击图片或标题进入详情 · “更多”进入分区列表
    </div>

    <script src="/product/resource-common.js"></script>
    <script type="text/javascript" th:inline="javascript">
        (function() {
            const container = document.getElementById('board-cards-container');
            if (!container) return;
            

            boards.forEach(board => {
                //const latestThreads = board.threads.slice(-4).reverse();
                let latestThreads=[];
                let latestThreads2=[];
                if('movie'==board.id){
                	latestThreads2=[[${movie}]];
                }else if('image'==board.id){
                	latestThreads2=[[${image}]];
                }else if('comic'==board.id){
                	latestThreads2=[[${comic}]];
                }
                latestThreads2.forEach(j=>{
                	latestThreads.push(mapResourceToDto(j,board.id));
                });
                const col = document.createElement('div');
                col.className = 'col-md-6 col-lg-3';

                let latestHtml = '';
                latestThreads.forEach(thread => {
                    const imgPath = thread.previewImg;
                    latestHtml += `
                        <a href="resource-detail.html?id=${thread.id}&resourceType=${board.id}" class="latest-item">
                            <img src="${imgPath}" alt="${thread.title}" loading="lazy" onerror="this.onerror=null; this.src='assets/images/placeholder.jpg'">
                            <span>${thread.title}</span>
                        </a>
                    `;
                });

                col.innerHTML = `
                    <div class="card h-100">
                        <div class="card-body pb-0">
                            <h5 class="card-title d-flex justify-content-between">
                                <span>${board.name}</span>
                                <span class="badge bg-light text-dark">${board.threads.length}个资源</span>
                            </h5>
                            <div class="latest-grid">
                                ${latestHtml}
                            </div>
                        </div>
                        <div class="card-footer-action d-flex justify-content-between align-items-center">
                            <small class="text-secondary">最新4条</small>
                            <a href="resource-board.html?board=${board.id}" class="btn btn-sm btn-outline-primary">更多${board.name}</a>
                        </div>
                    </div>
                `;
                container.appendChild(col);
            });
        })();
    </script>
    <script src="assets/js/bootstrap.bundle.min.js"></script>
</body>
</html>
