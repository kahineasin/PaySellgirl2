<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>会员中心 · 电子书库</title>
    <link href="assets/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/bootstrap-icons.min.css">
    <style>
        body { background: #f8f9fa; }
        .navbar { background-color: #2c3e50; }
        .favorite-item { background: white; border-radius: 12px; padding: 1rem; margin-bottom: 1rem; transition: background 0.1s; position: relative; }
        .favorite-item:hover { background: #e9ecef; }
        .favorite-link { text-decoration: none; color: inherit; display: flex; align-items: center; gap: 1rem; flex: 1; }
        .favorite-cover { width: 60px; height: 80px; object-fit: cover; border-radius: 6px; }
        .resource-cover { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; }
        .cancel-fav { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); }
        .points-section, .sign-section, .upgrade-section { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; }
        .upgrade-section { border: 1px solid #ffc107; }
        .announcement-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 0;
            font-size: 14px;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
            z-index: 1000;
        }
        .announcement-bar marquee { width: 100%; cursor: default; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html" id="brandLink">📚 电子书库</a>
            <div class="d-flex align-items-center gap-2">
                <div id="switchBtnContainer" style="display: none;"></div>
                <form class="d-flex" action="ebook-search.html" method="get">
                    <input class="form-control form-control-sm me-2" type="search" name="q" placeholder="搜索..." required>
                    <button class="btn btn-outline-light btn-sm" type="submit">搜索</button>
                </form>
                <div class="d-flex align-items-center gap-2" id="userInfo"></div>
            </div>
        </div>
    </nav>

    <div class="announcement-bar" id="announcementBar">
        <marquee behavior="scroll" direction="left" scrollamount="3"></marquee>
    </div>

    <script src="announcement.js"></script>
    <script>
        document.querySelector('#announcementBar marquee').innerHTML = ANNOUNCEMENT_TEXT;
    </script>

    <script src="common.js"></script>
    <script src="/sg/js/jq/jquery-2.1.4.js"></script>
    <script src="/product/common2.js"></script>

    <div class="container my-4">
        <div class="points-section" id="pointsDisplay"></div>
        <div class="sign-section">
            <h3>每日签到</h3>
            <p>连续签到 <span id="consecutiveDays"  th:text="${signDay}">0</span> 天（连续10天可获得1积分）</p>
            <button id="signBtn" class="btn btn-primary">签到</button>
        </div>

        <div id="upgradeSection" class="upgrade-section" style="display: none;">
            <h5>🔓 升级为资源用户</h5>
            <p>输入邀请码，即可解锁资源站访问权限，享受更多精彩内容！</p>
            <form id="upgradeForm">
                <div class="input-group mb-3">
                    <input type="text" class="form-control" id="upgradeInviteCode" placeholder="请输入邀请码" required>
                    <button class="btn btn-outline-primary" type="submit">立即升级</button>
                </div>
                <div id="upgradeMessage"></div>
            </form>
        </div>

        <h1 class="mb-4">❤️ 我的收藏</h1>
        <div id="favoritesList"></div>
        <div id="emptyMsg" class="alert alert-info">暂无收藏内容</div>
        <a href="javascript:history.back()" class="btn btn-outline-secondary mt-3">← 返回</a>
    </div>

    <!-- 升级模态框 -->
    <div class="modal fade" id="upgradeModal" tabindex="-1" aria-labelledby="upgradeModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="upgradeModalLabel">🔓 升级为资源用户</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>输入邀请码，即可解锁资源站访问权限，享受更多精彩内容！</p>
                    <div class="mb-3">
                        <label class="form-label">邀请码</label>
                        <input type="text" class="form-control" id="modalInviteCode" placeholder="请输入邀请码">
                    </div>
                    <div id="modalUpgradeMessage"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="modalUpgradeBtn">立即升级</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const user = getCurrentUser();
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            const brandLink = document.getElementById('brandLink');
            const userInfoDiv = document.getElementById('userInfo');
            const switchBtnContainer = document.getElementById('switchBtnContainer');

            if (user.role === 'resource') {
                brandLink.href = 'resource-index.html';
                brandLink.textContent = '🎬 资源走廊';
            } else {
                brandLink.href = 'index.html';
                brandLink.textContent = '📚 电子书库';
            }

            const points = getUserPoints();
            let upgradeBtn = '';
            if (user.role !== 'resource') {
                upgradeBtn = `<button class="btn btn-sm btn-outline-warning me-2" data-bs-toggle="modal" data-bs-target="#upgradeModal">⭐ 升级资源站</button>`;
            }

            userInfoDiv.innerHTML = `
                <span class="badge bg-info text-dark me-2">⭐ ${points} 积分</span>
                <span class="text-light me-2">👤 ${user.username}</span>
                ${upgradeBtn}
                <a href="pay.html" class="btn btn-sm btn-warning me-2">积分充值</a>
                <a href="profile.html" class="btn btn-sm btn-outline-light me-2">会员中心</a>
                <a href="logout.html" class="btn btn-sm btn-outline-light">登出</a>
            `;

            if (user.role === 'resource') {
                const currentPage = window.location.pathname.split('/').pop();
                if (currentPage.startsWith('resource-')) {
                    switchBtnContainer.innerHTML = `<a href="index.html" class="btn btn-sm btn-outline-light me-2">📚 电子书库</a>`;
                } else {
                    switchBtnContainer.innerHTML = `<a href="resource-index.html" class="btn btn-sm btn-outline-light me-2">🎬 资源走廊</a>`;
                }
                switchBtnContainer.style.display = 'inline-block';
            } else {
                switchBtnContainer.style.display = 'none';
            }

            const pointsDiv = document.getElementById('pointsDisplay');
            pointsDiv.innerHTML = `<h3>当前积分：${points}</h3>`;

            const signStatus = getSignStatus();
            const signBtn = document.getElementById('signBtn');
            const consecutiveSpan = document.getElementById('consecutiveDays');
            consecutiveSpan.textContent = signStatus.consecutiveDays;
            if (signStatus.signedToday) {
                signBtn.disabled = true;
                signBtn.textContent = '今日已签到';
            } else {
                signBtn.disabled = false;
                signBtn.textContent = '签到 (连续10天得1积分)';
            }

			let signing=false;
            signBtn.addEventListener('click', function() {
                if(signing){return;}
                
                    const result = signIn(
                    	//user.username,
                    	user,
                    	function(result){                    	
		                    if (result.success) {
		                        if(result.pointsEarned){
		                        	alert(`签到成功！获得1积分。连续签到 ${result.signDays} 天。当前总积分：${result.point}`);
		                        }else{
		                        	alert('签到成功！连续签到 ' + result.signDays + ' 天');
		                        }
		                        location.reload();
				                //signBtn.disabled = true;
				                //signBtn.textContent = '今日已签到';
				                //signDaysSpan.textContent = result.signDays;
				                ////user.lastSignDate=getTodayStr();
				                ////user.signDays=result.signDays;
		                    } else {
		                        alert(result.message);
		                    }
		                    signing=false;
                    	}
                    );
                    
                return;    
                //const result = doSign();
                //if (result.success) {
                //    alert(`签到成功！获得 ${result.pointsEarned} 积分。连续签到 ${result.consecutiveDays} 天。当前总积分：${result.totalPoints}`);
                //    location.reload();
                //} else {
                //    alert(result.message);
                //}
            });

            const upgradeSection = document.getElementById('upgradeSection');
            if (user.role !== 'resource') {
                upgradeSection.style.display = 'block';
            } else {
                upgradeSection.style.display = 'none';
            }

            const favorites = getUserFavorites();
            const container = document.getElementById('favoritesList');
            const emptyMsg = document.getElementById('emptyMsg');

            if (favorites.length === 0) {
                emptyMsg.classList.remove('d-none');
            } else {
                emptyMsg.classList.add('d-none');
                favorites.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'favorite-item';
                    const coverClass = item.type === 'book' ? 'favorite-cover' : 'resource-cover';
                    const link = item.type === 'book' ? `book.html?id=${item.id}` : `resource-detail.html?id=${item.id}&resourceType=${item.resourceType}`;
                    div.innerHTML = `
                        <a href="${link}" class="favorite-link">
                            <img src="${item.cover || 'assets/images/placeholder.jpg'}" class="${coverClass}" alt="${item.title}" onerror="this.onerror=null; this.src='assets/images/placeholder.jpg'">
                            <div>
                                <h6>${item.title}</h6>
                                <small class="text-secondary">${item.author || item.description || item.type}</small>
                            </div>
                        </a>
                        <button class="btn btn-sm btn-outline-danger cancel-fav" data-type="${item.type}" data-id="${item.id}">取消收藏</button>
                    `;
                    container.appendChild(div);
                });

                container.addEventListener('click', function(e) {
                    if (e.target.classList.contains('cancel-fav')) {
                        const btn = e.target;
                        const type = btn.dataset.type;
                        const id = btn.dataset.id;
                        if (removeFavorite(type, id)) {
                            btn.closest('.favorite-item').remove();
                            if (container.children.length === 0) {
                                emptyMsg.classList.remove('d-none');
                            }
                        }
                    }
                });
            }

            const upgradeForm = document.getElementById('upgradeForm');
            const upgradeMessage = document.getElementById('upgradeMessage');
            if (upgradeForm) {
                upgradeForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const inviteCode = document.getElementById('upgradeInviteCode').value.trim();
                    
	                upgradeToResource(inviteCode,function(result){     
	                    if (result.success) {
	                        upgradeMessage.innerHTML = `<div class="alert alert-success">${result.message}</div>`;
	                        setTimeout(() => {
	                            location.reload();
	                        }, 1500);
	                    } else {
	                        upgradeMessage.innerHTML = `<div class="alert alert-danger">${result.message}</div>`;
	                    }
	                });
                
                });
            }
        })();
    </script>
    
    <script>
        const modalUpgradeBtn = document.getElementById('modalUpgradeBtn');
        if (modalUpgradeBtn) {
            modalUpgradeBtn.addEventListener('click', function() {
                const inviteCode = document.getElementById('modalInviteCode').value.trim();
                
                upgradeToResource(inviteCode,function(result){
	                const msgDiv = document.getElementById('modalUpgradeMessage');
	                if (result.success) {
	                    msgDiv.innerHTML = `<div class="alert alert-success">${result.message}</div>`;
	                    setTimeout(() => {
	                        location.reload();
	                    }, 1500);
	                } else {
	                    msgDiv.innerHTML = `<div class="alert alert-danger">${result.message}</div>`;
	                }
                });
                
            });
        }
    </script>

    <script src="assets/js/bootstrap.bundle.min.js"></script>
</body>
</html>
