<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>升级资源用户 · 电子书库</title>
    <link href="assets/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/bootstrap-icons.min.css">
</head>
<body class="bg-light">
    <div class="container" style="max-width: 400px; margin-top: 100px;">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">升级为资源用户</h3>
                <p class="text-muted text-center">输入邀请码，即可解锁资源站访问权限</p>
                <form id="upgradeForm">
                    <div class="mb-3">
                        <label class="form-label">邀请码</label>
                        <input type="text" class="form-control" id="inviteCode" placeholder="请输入邀请码" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">立即升级</button>
                </form>
                <div class="mt-3 text-center">
                    <a href="profile.html">返回会员中心</a>
                </div>
                <div id="message" class="mt-2 text-center"></div>
            </div>
        </div>
    </div>

    <script src="common.js"></script>
    <script>
        document.getElementById('upgradeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const inviteCode = document.getElementById('inviteCode').value.trim();
            const result = upgradeToResource(inviteCode);
            const msgDiv = document.getElementById('message');
            if (result.success) {
                msgDiv.innerHTML = `<div class="alert alert-success">${result.message}</div>`;
                setTimeout(() => {
                    window.location.href = 'profile.html';
                }, 1500);
            } else {
                msgDiv.innerHTML = `<div class="alert alert-danger">${result.message}</div>`;
            }
        });
    </script>
</body>
</html>
