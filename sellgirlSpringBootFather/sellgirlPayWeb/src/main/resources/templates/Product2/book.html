<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书籍目录 · 电子书库</title>
    <link href="assets/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/bootstrap-icons.min.css">
    <style>
        body { background: #f8f9fa; }
        .navbar { background-color: #2c3e50; }
        .chapter-item { padding: 0.8rem 1.2rem; background: white; border-radius: 10px; margin-bottom: 0.5rem; transition: background 0.1s; }
        .chapter-item:hover { background: #e9ecef; }
        .chapter-link { text-decoration: none; color: #2c3e50; display: block; }
        .unlock-btn { background-color: #ffc107; border: none; padding: 0.5rem 1.5rem; border-radius: 30px; font-weight: 500; }
        .unlock-btn:hover { background-color: #e0a800; }
        .announcement-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 0;
            font-size: 14px;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
            z-index: 1000;
        }
        .announcement-bar marquee { width: 100%; cursor: default; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html" id="brandLink">📚 电子书库</a>
            <div class="d-flex align-items-center gap-2">
                <div id="switchBtnContainer" style="display: none;"></div>
                <form class="d-flex" action="ebook-search.html" method="get">
                    <input class="form-control form-control-sm me-2" type="search" name="q" placeholder="搜索..." required>
                    <button class="btn btn-outline-light btn-sm" type="submit">搜索</button>
                </form>
                <div class="d-flex align-items-center gap-2" id="userInfo"></div>
            </div>
        </div>
    </nav>

    <div class="announcement-bar" id="announcementBar">
        <marquee behavior="scroll" direction="left" scrollamount="3"></marquee>
    </div>

    <script src="announcement.js"></script>
    <script>
        document.querySelector('#announcementBar marquee').innerHTML = ANNOUNCEMENT_TEXT;
    </script>

    <script src="common.js"></script>
    <script src="data-books.js"></script>
    <script>
        // 用户信息渲染
        (function() {
            const user = getCurrentUser();
            const userInfoDiv = document.getElementById('userInfo');
            const brandLink = document.getElementById('brandLink');
            if (user) {
                if (user.role === 'resource') {
                    brandLink.href = 'resource-index.html';
                    brandLink.textContent = '🎬 资源走廊';
                } else {
                    brandLink.href = 'index.html';
                    brandLink.textContent = '📚 电子书库';
                }
                const points = getUserPoints();
                let upgradeBtn = '';
                if (user.role !== 'resource') {
                    upgradeBtn = `<button class="btn btn-sm btn-outline-warning me-2" data-bs-toggle="modal" data-bs-target="#upgradeModal">⭐ 升级资源站</button>`;
                }
                userInfoDiv.innerHTML = `
                    <span class="badge bg-info text-dark me-2">⭐ ${points} 积分</span>
                    <span class="text-light me-2">👤 ${user.username}</span>
                    ${upgradeBtn}
                    <a href="pay.html" class="btn btn-sm btn-warning me-2">积分充值</a>
                    <a href="profile.html" class="btn btn-sm btn-outline-light me-2">会员中心</a>
                    <a href="logout.html" class="btn btn-sm btn-outline-light">登出</a>
                `;
            } else {
                brandLink.href = 'index.html';
                brandLink.textContent = '📚 电子书库';
                userInfoDiv.innerHTML = `
                    <a href="login.html" class="btn btn-sm btn-outline-light me-2">登录</a>
                    <a href="register.html" class="btn btn-sm btn-outline-light">注册</a>
                `;
            }
        })();

        (function() {
            const user = getCurrentUser();
            const switchBtnContainer = document.getElementById('switchBtnContainer');
            if (user && user.role === 'resource') {
                const currentPage = window.location.pathname.split('/').pop();
                if (currentPage.startsWith('resource-')) {
                    switchBtnContainer.innerHTML = `<a href="index.html" class="btn btn-sm btn-outline-light me-2">📚 电子书库</a>`;
                } else {
                    switchBtnContainer.innerHTML = `<a href="resource-index.html" class="btn btn-sm btn-outline-light me-2">🎬 资源走廊</a>`;
                }
                switchBtnContainer.style.display = 'inline-block';
            } else {
                switchBtnContainer.style.display = 'none';
            }
        })();
    </script>

    <div class="container my-4">
        <div class="mb-4">
            <h1 id="book-title"></h1>
            <p class="text-secondary" id="book-author"></p>
            <div class="d-flex gap-2">
                <a href="index.html" class="btn btn-outline-secondary btn-sm">← 返回首页</a>
                <button id="favoriteBtn" class="btn btn-outline-warning btn-sm">⭐ 收藏本书</button>
                <button id="unlockBtn" class="btn unlock-btn btn-sm" style="display: none;">🔓 消耗1积分解锁本书</button>
            </div>
        </div>

        <div id="lockedMessage" class="alert alert-warning" style="display: none;">
            <strong>📘 本书需消耗1积分解锁阅读</strong><br>
            解锁后即可查看全部章节内容，一次解锁永久有效。
        </div>

        <div id="chapterArea" style="display: none;">
            <h3>章节目录</h3>
            <div id="chapter-list" class="list-group"></div>
        </div>
        <div id="empty-msg" class="alert alert-warning d-none">暂无章节</div>
    </div>

    <script>
        (function() {
            const params = new URLSearchParams(location.search);
            const bookId = params.get('id');
            const book = books.find(b => b.id === bookId);
            const titleEl = document.getElementById('book-title');
            const authorEl = document.getElementById('book-author');
            const chapterListEl = document.getElementById('chapter-list');
            const emptyMsg = document.getElementById('empty-msg');
            const favoriteBtn = document.getElementById('favoriteBtn');
            const unlockBtn = document.getElementById('unlockBtn');
            const lockedMessage = document.getElementById('lockedMessage');
            const chapterArea = document.getElementById('chapterArea');

            if (!book) {
                titleEl.textContent = '书籍不存在';
                return;
            }

            titleEl.textContent = book.title;
            authorEl.innerHTML = `作者：<a href="author.html?name=${encodeURIComponent(book.author)}" style="color: #2c3e50; text-decoration: underline;">${book.author}</a>`;

            const unlocked = isBookUnlocked(bookId);
            if (unlocked) {
                chapterArea.style.display = 'block';
                lockedMessage.style.display = 'none';
                unlockBtn.style.display = 'none';
                if (!book.chapters || book.chapters.length === 0) {
                    emptyMsg.classList.remove('d-none');
                } else {
                    emptyMsg.classList.add('d-none');
                    book.chapters.forEach(chapter => {
                        const item = document.createElement('div');
                        item.className = 'chapter-item';
                        item.innerHTML = `<a href="chapter.html?book=${book.id}&chapter=${chapter.id}" class="chapter-link">📄 ${chapter.title}</a>`;
                        chapterListEl.appendChild(item);
                    });
                }
            } else {
                lockedMessage.style.display = 'block';
                chapterArea.style.display = 'none';
                const user = getCurrentUser();
                if (user) {
                    const points = getUserPoints();
                    if (points >= 1) {
                        unlockBtn.style.display = 'inline-block';
                        unlockBtn.disabled = false;
                    } else {
                        unlockBtn.style.display = 'inline-block';
                        unlockBtn.disabled = true;
                        unlockBtn.textContent = '积分不足，请先充值';
                    }
                } else {
                    unlockBtn.style.display = 'inline-block';
                    unlockBtn.disabled = true;
                    unlockBtn.textContent = '请先登录';
                }

                unlockBtn.addEventListener('click', function() {
                    if (!getCurrentUser()) {
                        alert('请先登录');
                        window.location.href = 'login.html';
                        return;
                    }
                    if (unlockBook(bookId)) {
                        alert('解锁成功！消耗1积分，现在可以阅读本书了。');
                        location.reload();
                    } else {
                        alert('解锁失败，可能积分不足，请先充值。');
                    }
                });
            }

            function updateFavoriteBtn() {
                if (isFavorite('book', book.id)) {
                    favoriteBtn.textContent = '★ 已收藏';
                    favoriteBtn.classList.remove('btn-outline-warning');
                    favoriteBtn.classList.add('btn-warning');
                } else {
                    favoriteBtn.textContent = '⭐ 收藏本书';
                    favoriteBtn.classList.remove('btn-warning');
                    favoriteBtn.classList.add('btn-outline-warning');
                }
            }
            updateFavoriteBtn();

            favoriteBtn.addEventListener('click', function() {
                if (!getCurrentUser()) {
                    alert('请先登录');
                    window.location.href = 'login.html';
                    return;
                }
                if (isFavorite('book', book.id)) {
                    removeFavorite('book', book.id);
                } else {
                    addFavorite({
                        type: 'book',
                        id: book.id,
                        title: book.title,
                        cover: book.cover,
                        author: book.author
                    });
                }
                updateFavoriteBtn();
            });
        })();
    </script>

    <!-- 升级模态框 -->
    <div class="modal fade" id="upgradeModal" tabindex="-1" aria-labelledby="upgradeModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="upgradeModalLabel">🔓 升级为资源用户</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>输入邀请码，即可解锁资源站访问权限，享受更多精彩内容！</p>
                    <div class="mb-3">
                        <label class="form-label">邀请码</label>
                        <input type="text" class="form-control" id="modalInviteCode" placeholder="请输入邀请码">
                    </div>
                    <div id="modalUpgradeMessage"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="modalUpgradeBtn">立即升级</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const modalUpgradeBtn = document.getElementById('modalUpgradeBtn');
        if (modalUpgradeBtn) {
            modalUpgradeBtn.addEventListener('click', function() {
                const inviteCode = document.getElementById('modalInviteCode').value.trim();
                const result = upgradeToResource(inviteCode);
                const msgDiv = document.getElementById('modalUpgradeMessage');
                if (result.success) {
                    msgDiv.innerHTML = `<div class="alert alert-success">${result.message}</div>`;
                    setTimeout(() => {
                        location.reload();
                    }, 1500);
                } else {
                    msgDiv.innerHTML = `<div class="alert alert-danger">${result.message}</div>`;
                }
            });
        }
    </script>

    <script src="assets/js/bootstrap.bundle.min.js"></script>
</body>
</html>
